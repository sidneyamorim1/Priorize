[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Redireciona /api/send-email para a função Netlify
[[redirects]]
  from = "/api/send-email"
  to = "/.netlify/functions/send-email"
  status = 200

# SPA fallback: todas as rotas vão para o index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
